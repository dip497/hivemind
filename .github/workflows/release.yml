name: release

# Tag-driven release. Push a tag like `v0.1.0` and this workflow:
#   1. builds the CLI single-binary (`bun build --compile`)
#   2. builds the renderer + Electron main (electron-vite)
#   3. packages the AppImage (electron-builder --linux AppImage)
#   4. creates the GitHub Release using the tag as the version
#   5. uploads `hive` and `hivemind-<version>-x86_64.AppImage` as assets
#
# Triggered automatically by `git tag v0.1.0 && git push origin v0.1.0`,
# or manually via the "Run workflow" button (uses the workflow_dispatch input).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to publish (e.g. v0.1.0)"
        required: true
        default: "v0.0.1"

permissions:
  contents: write  # needed to create releases + upload assets

jobs:
  build-linux:
    name: build linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # version pinned via `packageManager` in package.json (avoid dupes)
          run_install: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1"

      - name: pnpm install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build CLI single-binary
        run: pnpm --filter @hivemind/cli run build

      - name: Build renderer + main
        run: pnpm --filter @hivemind/desktop run build

      - name: pnpm deploy (materialize workspace deps for electron-builder)
        # electron-builder rejects workspace symlinks that point outside the
        # app dir (it expects every node_module to live under apps/desktop/).
        # `pnpm deploy` copies the package + all transitive deps (including
        # other workspace packages, dereferenced) into a self-contained dir.
        # NOT --prod: electron itself is a devDependency in apps/desktop, and
        # electron-builder needs it installed in the deploy dir to read the
        # version it should bundle ("Cannot compute electron version" otherwise).
        run: pnpm --filter @hivemind/desktop deploy --legacy desktop-deploy

      - name: Copy build output into deploy
        # electron-vite emits to apps/desktop/out — the deploy copy has only
        # source. The AppImage just needs `out/**/*` + package.json (per the
        # `build.files` config).
        run: |
          cp -r apps/desktop/out desktop-deploy/
          # electron-builder reads linux.icon (icons/icon.png) from the deploy dir.
          cp -r apps/desktop/icons desktop-deploy/

      - name: Drop optional native dep cpu-features
        # ssh2 (remote SSH frames) lists `cpu-features` as an OPTIONAL dep — it
        # only picks a faster cipher when present, and falls back to pure JS
        # otherwise. electron-builder's native rebuild still tries to node-gyp
        # it and dies on the runner ("buildcheck.gypi not found"). It resolves
        # cpu-features from BOTH the deploy dir and the hoisted workspace-root
        # pnpm store, so nuke every copy in the tree; ssh2 works without it.
        # Remove the package dirs, the `cpu-features@<ver>` pnpm-store wrappers,
        # AND the dangling symlinks pnpm leaves in each `.pnpm/node_modules`
        # (a leftover symlink makes electron-builder ENOENT on stat). After
        # this, cpu-features is simply an unresolved OPTIONAL dep — non-fatal.
        run: |
          find "$GITHUB_WORKSPACE" \( -name 'cpu-features' -o -name 'cpu-features@*' \) -prune -exec rm -rf {} + 2>/dev/null || true
          echo "remaining cpu-features entries:"; find "$GITHUB_WORKSPACE" -name 'cpu-features*' 2>/dev/null || true

      - name: Package AppImage
        # Run electron-builder INSIDE the deployed copy so node_modules are
        # all under the app dir (no more "package.json must be under …" error).
        run: |
          cd desktop-deploy
          npx --yes electron-builder --linux AppImage \
            --config.directories.output=dist-electron
        env:
          DEBUG: electron-builder

      - name: Stage release artifacts
        id: stage
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # CLI single-binary
          cp apps/cli/dist/hive release-assets/hive-linux-x86_64
          chmod +x release-assets/hive-linux-x86_64
          # AppImage (electron-builder names it from package.json version)
          appimage=$(ls -1 desktop-deploy/dist-electron/*.AppImage 2>/dev/null | head -1)
          test -n "$appimage" || { echo "no AppImage built"; exit 1; }
          cp "$appimage" release-assets/
          ls -la release-assets/
          echo "assets_dir=release-assets" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (workflow result)
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: release-assets/

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/hive-linux-x86_64
            release-assets/*.AppImage
